<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collections — NOIR HOMME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --charcoal: #1a1a1a; --dark-gray: #2d2d2d;
      --mid-gray: #555; --light-gray: #aaa; --off-white: #f5f2ee;
      --cream: #ede9e3; --gold: #c9a96e; --gold-light: #e4c99a; --white: #fff;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--off-white); font-family: 'Montserrat', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }

    .cursor { position: fixed; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform 0.1s; }
    .cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid rgba(201,169,110,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform 0.15s ease-out; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 18px 60px; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,10,0.97); border-bottom: 1px solid var(--dark-gray); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 300; letter-spacing: 0.15em; color: var(--off-white); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 40px; align-items: center; }
    .nav-links a { color: var(--light-gray); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--gold); transition: width 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-cart { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 22px; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; position: relative; }
    .nav-cart:hover { background: var(--gold); color: var(--black); }
    .cart-count { position: absolute; top: -8px; right: -8px; background: var(--gold); color: var(--black); width: 18px; height: 18px; border-radius: 50%; font-size: 0.6rem; display: none; align-items: center; justify-content: center; font-weight: 600; }

    /* PAGE HEADER */
    .page-header {
      padding: 160px 60px 80px;
      background: var(--charcoal);
      position: relative; overflow: hidden;
    }
    .page-header::after {
      content: 'COLLECTIONS';
      position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 12vw; font-weight: 600;
      color: rgba(255,255,255,0.03);
      white-space: nowrap; pointer-events: none;
    }
    .page-label { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
    .page-label::before { content: ''; width: 30px; height: 1px; background: var(--gold); }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5rem); font-weight: 300; line-height: 1; }
    .page-title em { font-style: italic; color: var(--gold); }

    /* TOOLBAR */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 60px; border-bottom: 1px solid var(--dark-gray);
      background: var(--black); position: sticky; top: 73px; z-index: 50;
    }
    .filter-tabs { display: flex; gap: 4px; }
    .filter-tab {
      background: none; border: 1px solid transparent;
      color: var(--light-gray); padding: 8px 18px;
      font-family: 'Montserrat', sans-serif; font-size: 0.65rem;
      letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
      transition: all 0.3s;
    }
    .filter-tab:hover { border-color: var(--dark-gray); color: var(--off-white); }
    .filter-tab.active { border-color: var(--gold); color: var(--gold); }
    .sort-select {
      background: var(--charcoal); border: 1px solid var(--dark-gray);
      color: var(--off-white); padding: 8px 16px;
      font-family: 'Montserrat', sans-serif; font-size: 0.65rem;
      letter-spacing: 0.1em; cursor: pointer; outline: none;
    }
    .result-count { font-size: 0.7rem; color: var(--mid-gray); }

    /* PRODUCT GRID */
    .products-section { padding: 50px 60px 100px; }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px 24px;
    }

    .product-card {
      position: relative; cursor: pointer;
    }
    .product-img-wrap {
      position: relative; overflow: hidden;
      aspect-ratio: 3/4; background: var(--charcoal);
      margin-bottom: 20px;
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: brightness(0.9);
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.06); }

    .product-badge {
      position: absolute; top: 16px; left: 16px;
      background: var(--gold); color: var(--black);
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;
      padding: 5px 10px; z-index: 2;
    }
    .product-badge.new { background: var(--off-white); }
    .product-badge.sale { background: #c9696e; color: white; }

    .product-actions-hover {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .product-card:hover .product-actions-hover { transform: translateY(0); }
    .add-cart-btn {
      flex: 1; background: var(--gold); color: var(--black);
      border: none; padding: 14px;
      font-family: 'Montserrat', sans-serif; font-size: 0.65rem;
      letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;
      cursor: pointer; transition: background 0.3s;
    }
    .add-cart-btn:hover { background: var(--gold-light); }
    .wish-btn {
      width: 48px; background: rgba(10,10,10,0.9);
      border: none; color: var(--off-white);
      font-size: 1.1rem; cursor: pointer; transition: all 0.3s;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    .wish-btn:hover { background: var(--charcoal); color: var(--gold); }

    .product-info { }
    .product-cat { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; margin-bottom: 8px; transition: color 0.3s; }
    .product-card:hover .product-name { color: var(--gold); }
    .product-footer { display: flex; justify-content: space-between; align-items: center; }
    .product-price { font-size: 0.9rem; letter-spacing: 0.05em; }
    .product-price .original { text-decoration: line-through; color: var(--mid-gray); margin-right: 8px; font-size: 0.8rem; }
    .product-price .sale-price { color: #c9696e; }
    .product-sizes { display: flex; gap: 6px; }
    .size-dot { width: 24px; height: 24px; border: 1px solid var(--dark-gray); display: flex; align-items: center; justify-content: center; font-size: 0.5rem; letter-spacing: 0.1em; color: var(--mid-gray); }

    /* PAGINATION */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding-top: 60px; }
    .page-btn { width: 44px; height: 44px; border: 1px solid var(--dark-gray); background: none; color: var(--light-gray); font-family: 'Montserrat', sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; }
    .page-btn.active { border-color: var(--gold); color: var(--gold); }
    .page-btn:hover { border-color: var(--gold); color: var(--gold); }
    .page-btn.arrow { font-size: 1rem; }

    /* SIDE FILTERS (desktop) */
    .layout-with-filters { display: grid; grid-template-columns: 260px 1fr; gap: 40px; align-items: start; padding: 50px 60px 100px; }
    .sidebar { position: sticky; top: 130px; }
    .sidebar-section { border-bottom: 1px solid var(--dark-gray); padding-bottom: 24px; margin-bottom: 24px; }
    .sidebar-title { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .sidebar-option { display: flex; align-items: center; gap: 12px; padding: 7px 0; cursor: pointer; }
    .sidebar-option input[type=checkbox] { accent-color: var(--gold); width: 14px; height: 14px; }
    .sidebar-option label { font-size: 0.78rem; color: var(--light-gray); cursor: pointer; transition: color 0.3s; }
    .sidebar-option:hover label { color: var(--off-white); }
    .price-range { display: flex; gap: 10px; align-items: center; font-size: 0.7rem; color: var(--light-gray); }
    .price-range input[type=range] { accent-color: var(--gold); flex: 1; }

    /* NOTIFICATION */
    .notification { position: fixed; bottom: 30px; right: 30px; background: var(--charcoal); border: 1px solid var(--gold); padding: 18px 24px; z-index: 9999; transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); min-width: 260px; }
    .notification.show { transform: translateY(0); opacity: 1; }
    .notif-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .notif-msg { font-size: 0.8rem; color: var(--off-white); }

    footer { background: var(--black); padding: 40px 60px; border-top: 1px solid var(--dark-gray); display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: 0.1em; }
    .footer-logo span { color: var(--gold); }
    .footer-text { font-size: 0.7rem; color: var(--mid-gray); }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="notification" id="notification">
  <div class="notif-title">Added to Cart</div>
  <div class="notif-msg" id="notifMsg">Item added</div>
</div>

<nav>
  <a href="index.html" class="nav-logo">NOIR<span>.</span>HOMME</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html" class="active">Collections</a>
    <a href="#">Lookbook</a>
    <a href="#">About</a>
  </div>
  <button class="nav-cart" onclick="window.location.href='checkout.html'">
    Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<div class="page-header">
  <div class="page-label">SS 2026</div>
  <h1 class="page-title">All <em>Collections</em></h1>
</div>

<div class="toolbar">
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="Outerwear">Outerwear</button>
    <button class="filter-tab" data-filter="Tailoring">Tailoring</button>
    <button class="filter-tab" data-filter="Shirts">Shirts</button>
    <button class="filter-tab" data-filter="Bottoms">Bottoms</button>
    <button class="filter-tab" data-filter="Accessories">Accessories</button>
  </div>
  <div style="display:flex;gap:20px;align-items:center;">
    <span class="result-count" id="resultCount">12 items</span>
    <select class="sort-select" id="sortSelect">
      <option>Featured</option>
      <option>Price: Low to High</option>
      <option>Price: High to Low</option>
      <option>Newest</option>
    </select>
  </div>
</div>

<div class="layout-with-filters">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Price Range</div>
      <div style="margin-bottom:10px;font-size:0.75rem;color:var(--light-gray)">$<span id="priceVal">800</span> max</div>
      <input type="range" min="50" max="800" value="800" id="priceSlider" style="width:100%;accent-color:var(--gold)">
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Size</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        <button class="size-filter-btn" data-size="XS">XS</button>
        <button class="size-filter-btn" data-size="S">S</button>
        <button class="size-filter-btn" data-size="M">M</button>
        <button class="size-filter-btn" data-size="L">L</button>
        <button class="size-filter-btn" data-size="XL">XL</button>
        <button class="size-filter-btn" data-size="XXL">XXL</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Color</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div style="width:28px;height:28px;background:#0a0a0a;border:2px solid var(--gold);cursor:pointer;border-radius:50%"></div>
        <div style="width:28px;height:28px;background:#5c5c5c;border:1px solid #333;cursor:pointer;border-radius:50%"></div>
        <div style="width:28px;height:28px;background:#f5f2ee;border:1px solid #333;cursor:pointer;border-radius:50%"></div>
        <div style="width:28px;height:28px;background:#c9a96e;border:1px solid #333;cursor:pointer;border-radius:50%"></div>
        <div style="width:28px;height:28px;background:#2d4a5c;border:1px solid #333;cursor:pointer;border-radius:50%"></div>
        <div style="width:28px;height:28px;background:#4a2d2d;border:1px solid #333;cursor:pointer;border-radius:50%"></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Style</div>
      <div class="sidebar-option"><input type="checkbox" id="formal"><label for="formal">Formal</label></div>
      <div class="sidebar-option"><input type="checkbox" id="casual"><label for="casual">Casual</label></div>
      <div class="sidebar-option"><input type="checkbox" id="business"><label for="business">Business</label></div>
      <div class="sidebar-option"><input type="checkbox" id="sport"><label for="sport">Sport</label></div>
    </div>
    <button onclick="window.location.href='checkout.html'" style="width:100%;background:var(--gold);color:var(--black);border:none;padding:14px;font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:600;cursor:pointer;margin-top:10px;">View Cart</button>
  </aside>

  <!-- PRODUCTS -->
  <div>
    <div class="products-grid" id="productsGrid"></div>
    <!-- <div class="pagination">
      <button class="page-btn arrow">←</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn arrow">→</button>
    </div> -->
  </div>
</div>

<footer>
  <div class="footer-logo">NOIR<span>.</span>HOMME</div>
  <div class="footer-text">© 2026 NOIR HOMME. All rights reserved.</div>
</footer>

<script>
  const cursor = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursorRing');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
    setTimeout(() => { cursorRing.style.left = e.clientX + 'px'; cursorRing.style.top = e.clientY + 'px'; }, 80);
  });

  const products = [
    { id:1, name:'Obsidian Wool Overcoat', cat:'Outerwear', price:589, badge:'bestseller', img:'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=500&q=80', sizes:['S','M','L','XL'] },
    { id:2, name:'Slate Linen Blazer', cat:'Tailoring', price:345, badge:'new', img:'https://wear.style/cdn/shop/files/174038971444adb1b0954c0c08a680180a99928554.jpg?v=1744389409&width=1646', sizes:['S','M','L'] },
    { id:3, name:'Midnight Slim Trousers', cat:'Bottoms', price:220, badge:'', img:'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=500&q=80', sizes:['S','M','L','XL'] },
    { id:4, name:'Ivory Oxford Shirt', cat:'Shirts', price:175, badge:'new', img:'https://images.unsplash.com/photo-1598033129183-c4f50c736f10?w=500&q=80', sizes:['S','M','L','XL','XXL'] },
    { id:5, name:'Cashmere Turtleneck', cat:'Shirts', price:290, badge:'', img:'https://images.unsplash.com/photo-1543087903-1ac2ec7aa8c5?w=500&q=80', sizes:['M','L','XL'] },
    { id:6, name:'Charcoal Double Breasted', cat:'Tailoring', price:620, badge:'', img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&q=80', sizes:['S','M','L'] },
    { id:7, name:'Desert Sand Chinos', cat:'Bottoms', price:185, badge:'sale', img:'https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=500&q=80', originalPrice:240, sizes:['S','M','L','XL'] },
    { id:8, name:'Leather Derby Shoes', cat:'Accessories', price:420, badge:'', img:'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500&q=80', sizes:['41','42','43','44','45'] },
    { id:9, name:'Merino Crewneck', cat:'Shirts', price:210, badge:'new', img:'https://images.unsplash.com/photo-1571945153237-4929e783af4a?w=500&q=80', sizes:['S','M','L','XL'] },
    { id:10, name:'Black Denim Jacket', cat:'Outerwear', price:315, badge:'', img:'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500&q=80', sizes:['S','M','L','XL'] },
    { id:11, name:'Caramel Leather Belt', cat:'Accessories', price:89, badge:'sale', img:'https://wear.style/cdn/shop/products/product-image-283026704_637db5ff-2481-4882-b4e0-361bea716ce4.jpg?v=1652207413&width=1646', originalPrice:120, sizes:['S','M','L'] },
    { id:12, name:'Navy Wool Scarf', cat:'Accessories', price:145, badge:'', img:'https://images.unsplash.com/photo-1520903920243-00d872a2d1c9?w=500&q=80', sizes:['One Size'] },
  ];

  let filtered = [...products];
  let activeFilter = 'all';

  function renderProducts(list) {
    const grid = document.getElementById('productsGrid');
    document.getElementById('resultCount').textContent = `${list.length} items`;
    grid.innerHTML = list.map(p => `
      <div class="product-card">
        <div class="product-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy">
          ${p.badge ? `<div class="product-badge ${p.badge === 'sale' ? 'sale' : p.badge === 'new' ? 'new' : ''}">${p.badge}</div>` : ''}
          <div class="product-actions-hover">
            <button class="add-cart-btn" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
            <button class="wish-btn" title="Wishlist">♡</button>
          </div>
        </div>
        <div class="product-info">
          <div class="product-cat">${p.cat}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-footer">
            <div class="product-price">
              ${p.originalPrice ? `<span class="original">$${p.originalPrice}</span><span class="sale-price">$${p.price}</span>` : `$${p.price}`}
            </div>
            <div class="product-sizes">
              ${p.sizes.slice(0,3).map(s => `<div class="size-dot">${s}</div>`).join('')}
              ${p.sizes.length > 3 ? `<div class="size-dot">+${p.sizes.length-3}</div>` : ''}
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', function() {
    applyFilters();
  });

  // Price slider
  document.getElementById('priceSlider').addEventListener('input', function() {
    document.getElementById('priceVal').textContent = this.value;
    applyFilters();
  });

  // Size filter buttons
  document.querySelectorAll('.size-filter-btn').forEach(btn => {
    btn.style.cssText = `background:none;border:1px solid var(--dark-gray);color:var(--light-gray);padding:6px 12px;font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.3s;`;
    btn.addEventListener('click', function() {
      this.classList.toggle('size-active');
      this.style.borderColor = this.classList.contains('size-active') ? 'var(--gold)' : 'var(--dark-gray)';
      this.style.color = this.classList.contains('size-active') ? 'var(--gold)' : 'var(--light-gray)';
      applyFilters();
    });
  });

  function applyFilters() {
    const maxPrice = parseInt(document.getElementById('priceSlider').value);
    const sortVal = document.getElementById('sortSelect').value;
    let list = products.filter(p => {
      if (activeFilter !== 'all' && p.cat !== activeFilter) return false;
      if (p.price > maxPrice) return false;
      return true;
    });
    if (sortVal === 'Price: Low to High') list.sort((a,b) => a.price - b.price);
    else if (sortVal === 'Price: High to Low') list.sort((a,b) => b.price - a.price);
    renderProducts(list);
  }

  // Cart
  function getCart() { return JSON.parse(localStorage.getItem('noirCart') || '[]'); }
  function saveCart(cart) { localStorage.setItem('noirCart', JSON.stringify(cart)); }
  function updateCartUI() {
    const cart = getCart();
    const total = cart.reduce((s,i) => s + i.qty, 0);
    const el = document.getElementById('cartCount');
    el.textContent = total; el.style.display = total > 0 ? 'flex' : 'none';
  }
  function addToCart(id, name, price) {
    const cart = getCart();
    const ex = cart.find(i => i.id === id);
    if (ex) ex.qty++; else cart.push({ id, name, price, qty: 1 });
    saveCart(cart); updateCartUI();
    const n = document.getElementById('notification');
    document.getElementById('notifMsg').textContent = `${name} added to cart`;
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 3000);
  }

  renderProducts(products);
  updateCartUI();
